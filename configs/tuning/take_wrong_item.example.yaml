schema_version: wm-tuning-v1
experiment: take_wrong_item_right_arm

models:
  fastwam:
    repo: "${FASTWAM_REPO}"
    python: "${FASTWAM_PYTHON}"
    data_root: "${PROCESS_WM_DATA_REPO}"
    case_manifest: "${FASTWAM_CASE_MANIFEST}"
    normalization_stats: "${FASTWAM_NORMALIZATION_STATS}"
    text_embedding_cache_dir: "${FASTWAM_TEXT_CACHE}"
    diffsynth_model_base: "${FASTWAM_DIFFSYNTH_MODEL_BASE}"
    stage1_video_checkpoint: "${FASTWAM_STAGE1_VIDEO_CKPT}"
    action_dit_checkpoint: "${FASTWAM_ACTION_DIT_CKPT}"
    gpus: "0,1,2,3,4,5,6,7"
    phases:
      stage1_video:
        task: stage1_video_backbone_smoke
        allowed_modes: [joint_video_action, video_only]
        allowed_quality_tiers: [A]
        include_robot_supervision: false
        max_samples: 1
      stage2_memory:
        task: stage2_memory_fastwam_smoke
        allowed_modes: [joint_video_action]
        allowed_quality_tiers: [A]
        include_robot_supervision: true
        skip_dit_load_from_pretrain: true
        max_samples: 1
      stage3_finetune:
        task: stage3_robocoin_memory_smoke
        allowed_modes: [joint_video_action]
        allowed_quality_tiers: [A]
        include_robot_supervision: true
        skip_dit_load_from_pretrain: true
        initial_checkpoint: "${FASTWAM_STAGE2_MEMORY_CKPT}"
        max_samples: 1
      overfit:
        task: stage3_robocoin_memory_smoke
        requires_memory_joint_inference: true
        allowed_modes: [joint_video_action]
        allowed_quality_tiers: [A]
        include_robot_supervision: true
        skip_dit_load_from_pretrain: true
        initial_checkpoint: "${FASTWAM_STAGE2_MEMORY_CKPT}"
        sample_offset: 1
        sample_stride: 1
        max_samples: 1
        batch_size: 1
        gradient_accumulation_steps: 1
        learning_rate: 2.0e-5
        reference_learning_rate: 1.0e-4
        loss_lambda_video: 1.0
        loss_lambda_action: 1.0
        weight_decay: 0.0
        max_grad_norm: 1.0
        lr_scheduler_type: constant
        log_every: 1
        save_every: 50
        save_training_state: false
        eval_every: 50
        eval_num_inference_steps: 10
        eval_seed: 42
        eval_fixed_index: 0
        eval_at_start: true
        eval_use_train_dataset: true
        eval_video_fps: 5
      dataset_overfit:
        task: stage3_robocoin_memory_smoke
        requires_memory_joint_inference: true
        allowed_modes: [joint_video_action, video_only]
        allowed_quality_tiers: [A]
        splits: [train, validation]
        camera_roles: [global_primary, global_secondary, left_wrist, right_wrist]
        include_robot_supervision: true
        skip_dit_load_from_pretrain: true
        initial_checkpoint: "${FASTWAM_STAGE2_MEMORY_CKPT}"
        camera_rectification_config: "configs/cameras/tianji_xdof_measured_rational_v1.json"
        sample_offset: 0
        max_samples: null
        batch_size: 1
        gradient_accumulation_steps: 1
        learning_rate: 2.0e-5
        reference_learning_rate: 1.0e-4
        loss_lambda_video: 1.0
        loss_lambda_action: 1.0
        weight_decay: 0.0
        max_grad_norm: 1.0
        lr_scheduler_type: constant
        sampling_strategy: uniform
        num_workers: 2
        log_every: 10
        save_every: 250
        save_training_state: false
        eval_every: 250
        eval_num_inference_steps: 10
        eval_seed: 42
        eval_fixed_indices: [5, 87, 180, 239, 318, 377, 441, 480]
        eval_at_start: true
        eval_use_train_dataset: true
        eval_video_fps: 5

  lingbot_va:
    repo: "${LINGBOT_VA_REPO}"
    python: "${LINGBOT_VA_PYTHON}"
    dataset_root: "${LINGBOT_VA_TARGET}"
    model_root: "${LINGBOT_VA_MODEL_ROOT}"
    gpus: "1"
    num_gpus: 1
    workers: 0
    batch_size: 1
    window_frames: 0
    samples_per_episode: 1
    save_interval: 1
    gradient_accumulation_steps: 1
    allow_partial_latents: false

  dreamzero:
    repo: "${DREAMZERO_REPO}"
    python: "${DREAMZERO_PYTHON}"
    dataset_root: "${DREAMZERO_TARGET}"
    data_profile: dreamzero/xdof_relative
    wan_model_root: "${DREAMZERO_WAN_MODEL_ROOT}"
    text_encoder: "${DREAMZERO_TEXT_ENCODER}"
    image_encoder: "${DREAMZERO_IMAGE_ENCODER}"
    vae: "${DREAMZERO_VAE}"
    tokenizer_root: "${DREAMZERO_TOKENIZER_ROOT}"
    pretrained_model_root: "${DREAMZERO_PRETRAINED_MODEL_ROOT}"
    gpus: "0,1,2,3,4,5,6,7"
    num_gpus: 8
    batch_size: 1
    global_batch_size: 8
    save_interval: 125
    save_total_limit: 5
    workers: 0
    learning_rate: 1.0e-5
    warmup_ratio: 0.05
    image_width: 320
    image_height: 176
